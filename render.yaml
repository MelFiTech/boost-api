services:
  - type: web
    name: boost-api
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SMMSTONE_API_URL
        value: https://smmstone.com/api/v2
      - key: SMMSTONE_API_KEY
        sync: false
      - key: BUDPAY_PUBLIC_KEY
        sync: false
      - key: BUDPAY_SECRET_KEY
        sync: false
      - key: BUDPAY_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_MODE
        value: prod
      - key: ZEPTOMAIL_SMTP_HOST
        value: smtp.zeptomail.com
      - key: ZEPTOMAIL_SMTP_PORT
        value: "587"
      - key: ZEPTOMAIL_SMTP_USER
        value: emailapikey
      - key: ZEPTOMAIL_SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        value: noreply@boostlab.ng
      - key: FROM_NAME
        value: Boostlab
      - key: EXPO_ACCESS_TOKEN
        sync: false
      - key: APP_NAME
        value: Boost API
      - key: APP_VERSION
        value: 1.0.0
      - key: ADMIN_EMAIL
        value: admin@melfitech.com
      - key: DEFAULT_CURRENCY
        value: NGN
      - key: DEFAULT_EXCHANGE_RATE
        value: 1600
      - key: BCRYPT_SALT_ROUNDS
        value: 12
      - key: OTP_EXPIRY_MINUTES
        value: 5
      - key: SESSION_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: info
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: boostlab
      - key: R2_ENDPOINT
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: R2_API_TOKEN
        sync: false

 